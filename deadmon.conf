# deadmon web config
#
# This file is YAML. The application also accepts JSON.

app:
  name: deadmon
  # public_url: https://deadmon.example.net/
  poll_interval: 5
  tab_rotation_interval: 15
  timeout: 1.2
  rtt_scale_ms: 10
  latency_warning_ms: 250
  latency_critical_ms: 500
  retain_results: 30

alerts:
  enabled: true
  threshold: 3
  clear_threshold: 2
  channels:
    - name: slack-noc
      type: slack
      enabled: false
      webhook_url_env: SLACK_WEBHOOK_URL
      # Optional Slack destination channel override, if your webhook allows it.
      # channel: "#noc-alerts"
      # Optional Slack avatar emoji for incoming webhooks.
      # icon_emoji: ":scream:"
    - name: webex-noc
      type: webex
      enabled: false
      webhook_url_env: WEBEX_WEBHOOK_URL

groups:
  - name: Infrastructure & Externals
    description: public internet and third-party services
    # Optional group overrides. Target-level thresholds override these values.
    # latency_warning_ms: 150
    # latency_critical_ms: 350
    # alerts:
    #   threshold: 2
    #   clear_threshold: 3
    #   channels:
    #     - name: infrastructure-webex
    #       type: webex
    #       enabled: true
    #       webhook_url_env: INFRASTRUCTURE_WEBEX_WEBHOOK_URL
    targets:
      - name: googleDNS
        address: 8.8.8.8
        note: google DNS
      - name: quad9
        address: 9.9.9.9
        note: recursive DNS
      - name: mroot
        address: 202.12.27.33
        note: M-root DNS
      - name: kame
        address: 210.155.141.200
        note: IPv4 reachability

  - name: IPv6
    description: external IPv6 reachability
    targets:
      - name: mroot6
        address: 2001:dc3::35
        note: M-root IPv6
      - name: kame6
        address: 2001:2f0:0:8800::1:1
        note: IPv6 reachability

  - name: Relay Examples
    description: disabled examples for supported source types
    targets: []

# Supported target fields:
#
# Direct ping:
#   - name: googleDNS
#     address: 8.8.8.8
#     # Optional target-level alert delivery suppression:
#     # alerts: false
#
# Ping from a source interface/address:
#   - name: googleDNS-from-wan0
#     address: 8.8.8.8
#     source: wan0
#
# Ping via SSH relay host:
#   - name: google-via-ssh
#     address: 173.194.117.176
#     relay:
#       relay: X.X.X.X
#       os: Linux
#       user: USER
#       key: /run/secrets/relay_id_rsa
#
# Ping via SNMP RFC4560:
#   - name: googleDNS-via-snmp
#     address: 8.8.8.8
#     relay:
#       relay: X.X.X.X
#       via: snmp
#       community: public
#
# Ping via Linux network namespace:
#   - name: googleDNS-via-netns
#     address: 8.8.8.8
#     relay:
#       relay: netns1
#       via: netns
#
# Ping via Linux VRF:
#   - name: googleDNS-via-vrf
#     address: 8.8.8.8
#     relay:
#       relay: vrf1
#       via: vrf
#
# RouterOS REST API ping:
#   - name: googleDNS-via-routeros
#     address: 8.8.8.8
#     relay:
#       relay: router.example.net
#       via: routeros_api
#       username: api-user
#       password: change-me
#       method: https
#       verify: true
#
# TCP reachability:
#   - name: example-https
#     address: example.com
#     tcp:
#       dstport: 443
